version: 2

models:
  - name: int_volatility_metrics
    description: >
      20-day rolling volatility and Bollinger Bands for each commodity.
      Only includes rows with a full 20-day lookback window.
    columns:
      - name: symbol
        description: yfinance ticker symbol
        tests:
          - not_null
      - name: trade_date
        description: Trading day
        tests:
          - not_null
      - name: close_price
        description: Closing price for the day
        tests:
          - not_null
      - name: sma_20
        description: 20-day simple moving average of close price
        tests:
          - not_null
      - name: volatility
        description: 20-day rolling population standard deviation (must be >= 0)
        tests:
          - not_null
      - name: upper_band
        description: Upper Bollinger Band (SMA + 2 * stddev)
        tests:
          - not_null
      - name: lower_band
        description: Lower Bollinger Band (SMA - 2 * stddev)
        tests:
          - not_null
      - name: percent_b
        description: "%B indicator — position of close relative to bands (0-1 range typical)"
    tests:
      - unique:
          column_name: "symbol || '-' || trade_date"
