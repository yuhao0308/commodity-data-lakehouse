version: 2

sources:
  - name: commodity_lakehouse
    description: Published commodity data loaded by the ETL pipeline
    schema: public
    tables:
      - name: published_commodities
        description: >
          Validated and promoted commodity futures data.
          Only rows that passed Great Expectations validation are present.
        columns:
          - name: symbol
            description: yfinance ticker symbol (e.g., CL=F, GC=F, ZW=F)
          - name: trade_date
            description: Trading day date
          - name: open_price
            description: Opening price
          - name: high_price
            description: Intraday high
          - name: low_price
            description: Intraday low
          - name: close_price
            description: Closing price
          - name: volume
            description: Trading volume
          - name: source
            description: Data source identifier
          - name: published_at
            description: Timestamp when the row was promoted to published
