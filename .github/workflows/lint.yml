name: Lint

on:
  push:
    branches: ["**"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install ruff sqlfluff sqlfluff-templater-dbt dbt-core dbt-postgres

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: SQLFluff lint
        run: sqlfluff lint dbt/models/ --ignore parsing
